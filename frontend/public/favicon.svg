<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#040608" />
  
  <!-- Street Light Pole -->
  <path d="M10 26V12a6 6 0 0 1 6-6h6" fill="none" stroke="#4f6480" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Light Fixture / Lamp Head -->
  <rect x="19" y="6" width="7" height="4" rx="1" fill="#d97706" />
  
  <!-- Light Beam / Cone of Light -->
  <polygon points="19.5,10 13,24 29,24 22.5,10" fill="url(#lightBeam)" stroke="none" opacity="0.85" />
  
  <!-- Gradient for Light Beam -->
  <defs>
    <linearGradient id="lightBeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.0" />
    </linearGradient>
  </defs>
</svg>